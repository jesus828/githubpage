<style>
.sb-wrap {
  text-align: center;
  font-family: Arial, sans-serif;
  padding: 10px 0 20px;
}
.sb-wrap h2 {
  font-size: 20px;
  font-weight: 700;
  margin: 0 0 4px;
  color: #222;
}
.sb-wrap p {
  font-size: 14px;
  color: #444;
  margin: 0 0 16px;
}
.sb-form {
  display: flex;
  align-items: stretch;
  border: 1px solid #ccc;
  border-radius: 6px;
  overflow: visible;
  max-width: 1000px;
  margin: 0 auto;
  background: #fff;
}
.sb-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px 14px;
  border-right: 1px solid #ddd;
  min-width: 0;
}
.sb-field label {
  font-size: 10px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
  display: block;
  text-align: left;
}
.sb-field input[type="date"],
.sb-field select {
  border: none;
  outline: none;
  font-size: 14px;
  color: #222;
  width: 100%;
  background: transparent;
  padding: 0;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
}
.sb-guests-wrap {
  flex: 1.4;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px 14px;
  border-right: 1px solid #ddd;
  position: relative;
  cursor: pointer;
}
.sb-guests-wrap label {
  font-size: 10px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
  text-align: left;
}
.sb-guests-display {
  font-size: 14px;
  color: #222;
  text-align: left;
  user-select: none;
}
.sb-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 14px 16px;
  z-index: 9999;
  min-width: 240px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.sb-dropdown.open { display: block; }
.sb-counter {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.sb-counter:last-child { margin-bottom: 0; }
.sb-counter-label { font-size: 13px; color: #333; }
.sb-counter-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}
.sb-counter-controls button {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid #aaa;
  background: #fff;
  font-size: 18px;
  cursor: pointer;
  color: #333;
  line-height: 1;
  padding: 0;
}
.sb-counter-controls button:hover { background: #f0f0f0; }
.sb-counter-controls .sbcount { font-size: 14px; min-width: 20px; text-align: center; }
.sb-promo {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px 14px;
  border-right: 1px solid #ddd;
}
.sb-promo label {
  font-size: 10px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
  text-align: left;
}
.sb-promo input {
  border: none;
  outline: none;
  font-size: 14px;
  color: #222;
  width: 100%;
  background: transparent;
}
.sb-btn {
  background: #2d4a2d;
  color: #fff;
  border: none;
  padding: 0 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  border-radius: 0 6px 6px 0;
}
.sb-btn:hover { background: #1e3a1e; }

@media (max-width: 700px) {
  .sb-form { flex-direction: column; }
  .sb-field, .sb-guests-wrap, .sb-promo { border-right: none; border-bottom: 1px solid #ddd; }
  .sb-btn { padding: 14px; justify-content: center; border-radius: 0 0 6px 6px; }
}
</style>

<div class="sb-wrap">
  <h2>¡Reserva Ahora!</h2>
  <p>El mejor precio, sólo en nuestro sitio oficial, garantizado.</p>

  <div class="sb-form">

    <!-- Propiedad
    <div class="sb-field">
      <label>Propiedad</label>
      <select id="sbPropiedad">
        <option value="sotupa">Andean Wings Sotupa Eco Lodge</option>
        <option value="valley">Andean Wings Valley</option>
      </select>
    </div>-->

    <!-- Llegada -->
    <div class="sb-field">
      <label>Llegada</label>
      <input type="date" id="sb-checkin">
    </div>

    <!-- Salida -->
    <div class="sb-field">
      <label>Salida</label>
      <input type="date" id="sb-checkout">
    </div>

    <!-- Huéspedes -->
    <div class="sb-guests-wrap" id="sbGuestsWrap">
      <label>Huéspedes</label>
      <div class="sb-guests-display" id="sbGuestsDisplay">2 adultos · 0 niños · 1 hab.</div>
      <div class="sb-dropdown" id="sbDropdown">
        <div class="sb-counter">
          <span class="sb-counter-label">Adultos</span>
          <div class="sb-counter-controls">
            <button id="sb-adults-minus">−</button>
            <span class="sbcount" id="sbAdults">2</span>
            <button id="sb-adults-plus">+</button>
          </div>
        </div>
        <div class="sb-counter">
          <span class="sb-counter-label">Niños</span>
          <div class="sb-counter-controls">
            <button id="sb-children-minus">−</button>
            <span class="sbcount" id="sbChildren">0</span>
            <button id="sb-children-plus">+</button>
          </div>
        </div>
        <div class="sb-counter">
          <span class="sb-counter-label">Habitaciones</span>
          <div class="sb-counter-controls">
            <button id="sb-rooms-minus">−</button>
            <span class="sbcount" id="sbRooms">1</span>
            <button id="sb-rooms-plus">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Código promo -->
    <div class="sb-promo">
      <label>Código Promocional</label>
      <input type="text" id="sbPromo" placeholder="Opcional">
    </div>

    <button class="sb-btn" id="sbVerTarifas">Ver Tarifas &#128269;</button>

  </div>
</div>

<script>
(function() {

  // ── CONFIGURACIÓN PROPIEDADES ──────────────────────────────────
  var PROPIEDADES = {
    sotupa: "https://andeanwingssotupaecolodge.reservadirecto.com/lp.html?pos=AndeanWingsSotupaEcoLodge&webcache=off&tag=PmsLink&appID=111",
    valley: "https://andeanwingsvalley3d6.reservadirecto.com/lp.html?pos=AndeanWingsValley3d6&webcache=off&tag=PmsLink&appID=111"
  };
  // ──────────────────────────────────────────────────────────────

  var adults   = 2;
  var children = 0;
  var rooms    = 1;

  function updateDisplay() {
    var txt = adults + ' adulto' + (adults !== 1 ? 's' : '');
    txt += ' · ' + children + ' niño' + (children !== 1 ? 's' : '');
    txt += ' · ' + rooms + ' hab.';
    document.getElementById('sbGuestsDisplay').textContent = txt;
    document.getElementById('sbAdults').textContent   = adults;
    document.getElementById('sbChildren').textContent = children;
    document.getElementById('sbRooms').textContent    = rooms;
  }

  // Contadores
  document.getElementById('sb-adults-minus').addEventListener('click',   function(e){ e.stopPropagation(); adults   = Math.max(1, adults-1);   updateDisplay(); });
  document.getElementById('sb-adults-plus').addEventListener('click',    function(e){ e.stopPropagation(); adults++;                           updateDisplay(); });
  document.getElementById('sb-children-minus').addEventListener('click', function(e){ e.stopPropagation(); children = Math.max(0, children-1); updateDisplay(); });
  document.getElementById('sb-children-plus').addEventListener('click',  function(e){ e.stopPropagation(); children++;                         updateDisplay(); });
  document.getElementById('sb-rooms-minus').addEventListener('click',    function(e){ e.stopPropagation(); rooms    = Math.max(1, rooms-1);    updateDisplay(); });
  document.getElementById('sb-rooms-plus').addEventListener('click',     function(e){ e.stopPropagation(); rooms++;                            updateDisplay(); });

  // Toggle dropdown huéspedes
  document.getElementById('sbGuestsWrap').addEventListener('click', function() {
    document.getElementById('sbDropdown').classList.toggle('open');
  });

  // Cerrar dropdown al click fuera
  document.addEventListener('click', function(e) {
    if (!document.getElementById('sbGuestsWrap').contains(e.target)) {
      document.getElementById('sbDropdown').classList.remove('open');
    }
  });

  // Fechas por defecto
  function fmt(d) {
    return d.getFullYear() + '-'
      + String(d.getMonth()+1).padStart(2,'0') + '-'
      + String(d.getDate()).padStart(2,'0');
  }
  var hoy    = new Date();
  var manana = new Date(hoy); manana.setDate(hoy.getDate()+1);
  document.getElementById('sb-checkin').value  = fmt(hoy);
  document.getElementById('sb-checkout').value = fmt(manana);
  document.getElementById('sb-checkin').min    = fmt(hoy);
  document.getElementById('sb-checkout').min   = fmt(manana);

  document.getElementById('sb-checkin').addEventListener('change', function() {
    var ci = new Date(this.value + 'T00:00:00');
    ci.setDate(ci.getDate()+1);
    var minOut = fmt(ci);
    document.getElementById('sb-checkout').min = minOut;
    if (document.getElementById('sb-checkout').value <= this.value)
      document.getElementById('sb-checkout').value = minOut;
  });

  // Botón Ver Tarifas
  document.getElementById('sbVerTarifas').addEventListener('click', function() {
    var propiedad = document.getElementById('sbPropiedad').value;
    var checkin   = document.getElementById('sb-checkin').value;
    var checkout  = document.getElementById('sb-checkout').value;
    var promo     = document.getElementById('sbPromo').value;

    if (!checkin || !checkout) {
      alert('Por favor selecciona las fechas de llegada y salida.');
      return;
    }
    if (checkin >= checkout) {
      alert('La fecha de salida debe ser posterior a la llegada.');
      return;
    }

    var url = PROPIEDADES[propiedad]
      + '&checkin='  + checkin
      + '&checkout=' + checkout
      + '&adults='   + adults
      + '&children=' + children
      + '&rooms='    + rooms;

    if (promo) url += '&promo_code=' + encodeURIComponent(promo);

    window.open(url, '_blank');
  });

})();
</script>
